name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Create CI env file
        run: |
          cat > .env <<EOF
          GEMINI_API_KEY=dummy-ci-key
          GEMINI_MODEL=gemini-2.5-flash
          EOF

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
